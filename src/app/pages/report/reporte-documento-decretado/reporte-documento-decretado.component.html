<mat-card class="example-card" style="height: 90%;">
  <mat-card-title class="title-form">REPORTE DE DOCUMENTOS DECRETADOS</mat-card-title>
  <mat-card-content style="height: 100%;">
    <div class="row" style="height: 100%;">
      <div class="col"  >
        <iframe id="embeddedPage" style="width: 100%; height: 100%" ></iframe>
      </div>
    </div>
  </mat-card-content>
  <mat-card-actions style="text-align: right;">
    <button  mat-raised-button color="accent" (click)="close()" >CERRAR</button>
  </mat-card-actions>
</mat-card>
