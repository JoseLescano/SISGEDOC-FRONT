<div class="head" [ngClass]="getHeadClass()">
  <div class="head-content">
    <div class="head-content-left">
      <!-- <div class="search-container">
        <div class="normal-search">
          <input type="search" class="search" placeholder="Search...">
          <i class="fas fa-search search-icon"></i>
        </div>
      </div> -->
    </div>
    <div class="head-content-rigth">
      <div class="head-menu" >
        <div class="head-menu-item  mr-2" >
          <span class="badge text-bg-success m-3" >{{cargo}}</span>
        </div>
        <div class="head-menu-item">
          <button class="head-menu-item-btn ripple">
            <img [src]="'assets/Peru-Flag.png'" class="flag" alt="peru">
          </button>
        </div>
        <div class="head-menu-item">
          <button  class="head-menu-item-btn ripple" >
            <i class="fas fa-grip-horizontal menu-icon"></i>
          </button>
        </div>
      </div>
      <div class="head-user-avatar-container">
        <div class="head-user-avatar" [matMenuTriggerFor]="cerrarSession">
          <!-- <img src="https://sisgedo.ejercito.mil.pe/assets/person.jpeg" alt="user" class="user-avatar"> -->
          <img src="./../../../assets/person.jpeg" alt="user" class="user-avatar">
          <div class="circle-indicator pulse"></div>
        </div>
      </div>
    </div>
  </div>
</div>

<mat-menu #cerrarSession="matMenu">
  <button mat-menu-item >
    <i class="fas fa-user-circle"></i> VER PERFIL
  </button>
  <button mat-menu-item routerLink="/login">
    <i class="fas fa-power-off sidenav-link-icon"></i> CERRAR SESIÓN
  </button>
</mat-menu>
