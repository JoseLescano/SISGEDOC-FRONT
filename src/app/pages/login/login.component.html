<style>
  body {
      background-image: url('assets/fondo_camu.jpg');
      background-size: cover;
      height: 100vh;
      display: flex;
      justify-content: right;
      align-items: right;
  }
</style>

<body>
  <div class="login-wrapper" fxLayout="row" fxLayoutAlign="center center">
      <mat-card class="box">
        <mat-card-header>
          <mat-card-title>SISTEMA DE CONTROL DE ACCESO DEL EJÉRCITO</mat-card-title>
        </mat-card-header>
        <br>
        <form class="form-group" [formGroup]="_formulario" (ngSubmit)="login()" #loginForm="ngForm">
          <mat-card-content>
            <mat-form-field class="example-full-width">
              <input matInput type="text" name="username" formControlName="username"
                     placeholder="Usuario Chasqui" [(ngModel)]="username" class="username" (input)="convertirAMayusculas()" maxlength="60" />
            </mat-form-field>
            <mat-form-field class="example-full-width">
              <input matInput type="password" formControlName="password" name="password"
                     placeholder="Contraseña" [(ngModel)]="password" class="password" required minlength="8"
                     maxlength="30" />
            </mat-form-field>
            <button id="login" type="submit" class="custom-button">Iniciar Sesión
              <i class="fa fa-sign-in" aria-hidden="true"></i>
            </button>
          </mat-card-content>
        </form>
        <a mat-button style="color: white;" href="https://ws.ejercito.mil.pe/app-chasqui/">¿Has olvidado la contraseña?</a>
        <mat-progress-bar class="mat-progress-buffer-custom" *ngIf="loading" mode="indeterminate"></mat-progress-bar>
      </mat-card>
    </div>
</body>

<mat-card *ngIf="message">{{message}}</mat-card>
<mat-card *ngIf="error">{{error}}</mat-card>
