<div class="col-12">
    <mat-card class="m-2" >
      <div class="d-flex justify-content-between align-items-center">
      <mat-card-header class="title-form">
        <mat-card-title >LISTA DE ROLES</mat-card-title>
      </mat-card-header>
        <button mat-mini-fab color="primary" style="margin-right: 5px;" *ngIf="dataSource!=null" (click)="openDialog()"  >
          <i class="fas fa-plus"></i>
        </button>
      </div>
      <mat-card-content>
          <mat-form-field appearance="fill" class="example-full-width">
            <mat-label>Filtro</mat-label>
            <input matInput (keyup)="applyFilter($event)" placeholder="Ingrese valor" #input>
          </mat-form-field>

          <div class="mat-elevation-z8">
            <table mat-table [dataSource]="dataSource" matSort id="mytable">
              <ng-container matColumnDef="Codigo">
                <th mat-header-cell *matHeaderCellDef mat-sort-header sortActionDescription="Sort by Nro">Codigo</th>
                <td mat-cell *matCellDef="let row"><strong>{{row.codigo}}</strong></td>
              </ng-container>

              <ng-container matColumnDef="Nombre">
                <th mat-header-cell *matHeaderCellDef mat-sort-header style="width: 600px; margin: 5px;">Nombre</th>
                <td mat-cell *matCellDef="let row" style="padding: 10px;"> {{row.nombre}} </td>
              </ng-container>
    
              <ng-container matColumnDef="Acciones">
                <th mat-header-cell *matHeaderCellDef > Acciones </th>
                <td mat-cell *matCellDef="let row">
                  <div class="align-items-center">
                    <button mat-mini-fab color="accent" class="m-2" (click)="openDialog(row)"  >
                      <i class="fas fa-edit"></i>
                    </button>

                    <button mat-mini-fab color="warn" class="m-2" (click)="eliminar(row.codigo)" >
                      <i class="far fa-trash-alt"></i>
                    </button>
                  </div>
                </td>
              </ng-container>

              <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
              <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
              <tr class="mat-row" *matNoDataRow>
                  <td class="mat-cell" colspan="4">Sin resultado...</td>
              </tr>
            </table>
            <mat-paginator [pageSizeOptions]="[10, 15, 25, 100]"  aria-label="Select page of users"></mat-paginator>
          </div>
      </mat-card-content>
      <mat-card-actions align="start">
      </mat-card-actions>
    </mat-card>
  </div>
