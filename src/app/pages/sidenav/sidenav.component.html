<div class="sidenav" [ngClass]="collapsed ? 'sidenav-collapsed': ''">
    <div class="logo-container">
        <button class="logo" (click)="toggleCollapse()">S</button>
        <div class="logo-text" @fadeInOut *ngIf="collapsed">SISGEDO</div>
        <button class="btn-close" @rotate *ngIf="collapsed" (click)="closeSidenav()">
          <i class="fas fa-times"></i>
        </button>
    </div>
    <ul class="sidenav-nav">
      <li class="sidenav-nav-item">
        <a class="sidenav-nav-link" routerLink="/principal/dashboard">
          <i class="fas fa-home  sidenav-link-icon"></i>
          <span class="sidenav-link-text" @fadeInOut *ngIf="collapsed" >INICIO</span>
        </a>
      </li>
        <li class="sidenav-nav-item" *ngFor="let data of menus">
            <a class="sidenav-nav-link" [routerLink]="[data.url]"
                routerLinkActive="active"
                [matTooltip]="!collapsed ? data.nombre : ''"  matTooltipClass="custom-tooltip"
                [routerLinkActiveOptions]="{exact: true}">
                <i class="sidenav-link-icon" [class]="data.icon"
                  ></i>
                <span class="sidenav-link-text" @fadeInOut *ngIf="collapsed">
                    {{data.nombre}}
                </span>
            </a>
        </li>
    </ul>
  </div>
