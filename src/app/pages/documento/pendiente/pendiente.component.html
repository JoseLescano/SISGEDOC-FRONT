
<!-- <div class="container mt-2"> -->
  <div class="container loader" *ngIf="cargando"></div>
  <mat-card class="m-2" *ngIf="!cargando">
    <mat-card-header class="title-form">
      <mat-card-title >LISTA DE DOCUMENTOS PENDIENTES</mat-card-title>
    </mat-card-header>
    <mat-form-field appearance="fill" class="example-full-width">
      <mat-label>Filtro</mat-label>
      <input matInput (keyup)="applyFilter($event)" placeholder="Ingrese valor" #input>
    </mat-form-field>
  <mat-card-content>
    <div class="mat-elevation-z8">
      <table mat-table [dataSource]="dataSource" matSort>

        <ng-container matColumnDef="Nro">
          <th mat-header-cell mat-sort-header  *matHeaderCellDef> Nro. Registro </th>
          <td mat-cell *matCellDef="let row"> {{row.codigo}} </td>
        </ng-container>

        <ng-container matColumnDef="Asunto">
          <th mat-header-cell *matHeaderCellDef mat-sort-header sortActionDescription="Sort by Asunto">Asunto</th>
          <td mat-cell *matCellDef="let row"> {{row.asunto}} </td>
        </ng-container>

        <ng-container matColumnDef="Documento">
          <th mat-header-cell *matHeaderCellDef mat-sort-header>Documento</th>
          <td mat-cell *matCellDef="let row"> {{row.clase.nombre + ' Nro. ' + row.nroOrden }} </td>
        </ng-container>

        <ng-container matColumnDef="Origen">
          <th mat-header-cell *matHeaderCellDef mat-sort-header sortActionDescription="Sort by Origen">Origen</th>
          <td mat-cell *matCellDef="let row"> {{row.organizacionOrigen.acronimo }} </td>
        </ng-container>

        <ng-container matColumnDef="FechaDoc.">
          <th mat-header-cell *matHeaderCellDef mat-sort-header>FechaDoc.</th>
          <td mat-cell *matCellDef="let row"> {{row.fechaDocumento |date:"dd-MM-yyyy"}} </td>
        </ng-container>

        <ng-container matColumnDef="Acciones">
          <th mat-header-cell *matHeaderCellDef > Acciones </th>
          <td mat-cell *matCellDef="let row">
            <div class="example-button-row">
              <div class="example-flex-container">
                <div class="example-button-container">
                  <button mat-mini-fab color="primary" class="mr-2"  [routerLink]="['../acciones', row.codigo]"
                    data-bs-toggle="tooltip" data-bs-placement="bottom" title="Visualizar documento" >
                    <i class="far fa-file-pdf" ></i>
                  </button>

                  <button mat-mini-fab color="warn" [routerLink]="['../archivar', row.codigo]" 
                    data-bs-toggle="tooltip" data-bs-placement="bottom" title="Archivar documento" >
                    <i class="fas fa-archive" ></i>
                  </button>
                </div>
              </div>
            </div>
          </td>
        </ng-container>

        <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
        <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>

        <tr class="mat-row" *matNoDataRow>
          <td class="mat-cell" colspan="4">Sin datos obtenidos...</td>
        </tr>
      </table>

      <mat-paginator [pageSizeOptions]="[ 10, 15, 25, 100]"  
        aria-label="Select page of users"></mat-paginator>
    </div>
  </mat-card-content>
  <mat-card-footer>
    <mat-progress-bar mode="indeterminate" *ngIf="cargando" ></mat-progress-bar>
  </mat-card-footer>
</mat-card>
