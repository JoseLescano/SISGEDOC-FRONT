<mat-card class="firma-card">

  <!-- HEADER con botón cerrar -->
  <div class="modal-header">
    <span class="title-form">VISUALIZACIÓN DEL DOCUMENTO</span>

    <button mat-icon-button color="warn" (click)="close()" matTooltip="Cerrar" >
      <i class="fas fa-times-circle"></i>
    </button>
  </div>

  <mat-card-content class="content-container">
    <div class="viewer-flex">

      <iframe
        *ngIf="!errorPDF"
        id="embeddedPage"
        #embeddedPage
        class="pdf-viewer"
      ></iframe>

      <div class="error-container" *ngIf="errorPDF">
        <i class="fas fa-exclamation-triangle error-icon"></i>
        <p class="error-text">Error al cargar el PDF</p>
      </div>

    </div>
  </mat-card-content>

</mat-card>
