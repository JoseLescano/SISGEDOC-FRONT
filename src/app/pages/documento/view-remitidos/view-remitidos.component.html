
<mat-card class="m-2" >
    <mat-card-header class="title-form">
      <mat-card-title >LISTA DE DOCUMENTOS REMITIDOS</mat-card-title>
    </mat-card-header>
    <mat-card-content>
        <mat-form-field appearance="fill" class="example-full-width">
          <mat-label>Filtro</mat-label>
          <input matInput (keyup)="applyFilter($event)" placeholder="Ingrese valor" #input>
        </mat-form-field>
  
        <div class="mat-elevation-z8">
          <table mat-table [dataSource]="dataSource" matSort >  
            <ng-container matColumnDef="Nro">
              <th mat-header-cell *matHeaderCellDef mat-sort-header sortActionDescription="Sort by Nro">Nro. registro</th>
              <td mat-cell *matCellDef="let row"><strong>{{row.codigo }}</strong></td>
            </ng-container>
  
            <ng-container matColumnDef="Asunto">
              <th mat-header-cell *matHeaderCellDef mat-sort-header style="width: 600px; margin: 5px;">Asunto</th>
              <td mat-cell *matCellDef="let row" style="padding: 10px;"> {{row.asunto }} </td>
            </ng-container>
  
            <ng-container matColumnDef="Origen">
              <th mat-header-cell *matHeaderCellDef mat-sort-header>Origen</th>
              <td mat-cell *matCellDef="let row"> {{row.organizacionOrigen.acronimo }} </td>
            </ng-container>
  
            <ng-container matColumnDef="FechaDoc">
                <th mat-header-cell *matHeaderCellDef mat-sort-header>Fecha Doc.</th>
                <td mat-cell *matCellDef="let row"> {{row.fechaDocumento | date: 'dd/MM/YYYY' }} </td>
            </ng-container>
  
            <ng-container matColumnDef="Documento">
                <th mat-header-cell *matHeaderCellDef mat-sort-header style="width: 250px; margin: 5px;">Documento</th>
                <td mat-cell *matCellDef="let row" style="padding: 10px;"> {{row.clase.nombre + ' Nro. ' + row.nroOrden  }} </td>
            </ng-container>
  
            <ng-container matColumnDef="Acciones">
              <th mat-header-cell *matHeaderCellDef > Acciones </th>
              <td mat-cell *matCellDef="let row">
                <div class="example-button-row">
                  <div class="example-flex-container">
                    <div class="example-button-container">
                        <i class="far fa-file-pdf" style="color: red; " (click)="verDocumento(row)"></i>
                        <i class="fas fa-info-circle" style="color: brown;" ></i>
                    </div>
                  </div>
                </div>
              </td>
            </ng-container>
  
            <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
            <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
            <tr class="mat-row" *matNoDataRow>
                <td class="mat-cell" colspan="4">Sin resultado...</td>
            </tr>
          </table>
  
          <mat-paginator [pageSizeOptions]="[10, 15, 25, 100]"  aria-label="Select page of users"></mat-paginator>
        </div>
    </mat-card-content>
    <mat-card-actions align="start">
    </mat-card-actions>
    <mat-card-footer>
      <mat-progress-bar mode="indeterminate" *ngIf="cargando" ></mat-progress-bar>
    </mat-card-footer>
  </mat-card>
