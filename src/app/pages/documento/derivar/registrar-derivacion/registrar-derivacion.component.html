<div class="mt-2" >
  <mat-card style="height: 100%;">
    <mat-card-content style="height: 100%;">
        <div class="row" style="height: 100%;">
          <div class="col-sm-12 col-lg-7"  >
            <iframe id="embeddedPage" style="width: 100%; height: 100%" class="min-vh-100" *ngIf="!errorPDF"></iframe>
            <div  style="width: 100%; height: 100%; border: 1px solid black;
                  border-radius: 5px; align-items: center; align-content: center;
                  text-align: center; " class="min-vh-100" *ngIf="errorPDF">
            <i class="fas fa-exclamation-triangle" style="color: red;" ></i>
            <strong style="font-size: 12px;"> Error en PDF!</strong>
          </div>
          </div>
          <div class="col-sm-12 mt-sm-3 col-lg-5" >
            <mat-card-header>
              <mat-card-title>DERIVAR DOCUMENTO </mat-card-title>
            </mat-card-header>
              <mat-tab-group mat-align-tabs="start">
                <mat-tab label="DATOS GENERALES">
                  <form [formGroup]="form" (ngSubmit)="operate()" novalidate >
                    <mat-form-field  appearance="fill" class="mt-2">
                      <mat-label>CODIGO DE DOCUMENTO</mat-label>
                      <input matInput disabled value="{{vidDocumento}}">
                    </mat-form-field>

                    <ng-select placeholder="ORGANIZACION DESTINO" [virtualScroll]=true formControlName="destino"
                        class="example-full-width" [multiple]="true">
                        <mat-option>SELECCIONE</mat-option>
                        <ng-option *ngFor="let c of destinos" [value]="c.codigoInterno" >{{c.acronimo}}</ng-option>
                    </ng-select>

                    <mat-form-field class="example-full-width mt-2" appearance="fill" >
                        <mat-label>MOTIVO</mat-label>
                        <textarea matInput rows="7" [(ngModel)]="observaciones" formControlName="observacion" ></textarea>
                    </mat-form-field>
                    <div class="col-md-12" style="text-align: right;">
                        <button mat-raised-button type="submit" color="primary" style="margin-right: 5px;" [disabled]="form.invalid || cargando" >GUARDAR</button>
                        <button mat-raised-button type="button" color="warn" routerLink="/principal/pendientes">CANCELAR</button>
                    </div>
                  </form>
                </mat-tab>
              </mat-tab-group>

          </div>
        </div>
    </mat-card-content>
    <mat-card-footer>
      <mat-progress-bar mode="indeterminate" *ngIf="cargando" ></mat-progress-bar>
    </mat-card-footer>
  </mat-card>
  <!-- <div class="bg-warning p-2 text-dark bg-opacity-10 mw-100">{{form.value | json}}</div> -->
</div>
