<div class="container mt-2" style="height: 90%;">
  <mat-card style="height: 100%;">

    <mat-card-content style="height: 100%;">
        <div class="row" style="height: 100%;">
          <div class="col-sm-7 mb-3 mb-sm-0"  >
            <iframe id="embeddedPage" style="width: 100%; height: 100%"></iframe>
          </div>
          <div class="col-sm-5 mb-3 mb-sm-0" >
            <mat-card-header>
              <mat-card-title>ARCHIVAR DOCUMENTO </mat-card-title>
            </mat-card-header>
              <mat-tab-group mat-align-tabs="start">
                <mat-tab label="DATOS GENERALES">
                  <form class="example-form mt-2">
                    <mat-form-field  appearance="fill">
                      <mat-label>CODIGO DE DOCUMENTO</mat-label>
                      <input matInput disabled value="{{vidDocumento}}">
                    </mat-form-field>
                  </form>
                  <mat-form-field class="example-full-width" appearance="fill">
                      <mat-label>OBSERVACIONES</mat-label>
                      <textarea matInput rows="7" ></textarea>
                  </mat-form-field>
                  <div class="input-group mb-3">
                    <label class="input-group-text" for="inputGroupFile01">Upload</label>
                    <input type="file" class="form-control" id="inputGroupFile01">
                  </div>
                    <div class="col-md-12" style="text-align: right;">
                        <button mat-raised-button color="primary" style="margin-right: 5px;">GUARDAR</button>
                        <button mat-raised-button color="warn" routerLink="/">CANCELAR</button>
                    </div>
                </mat-tab>
              </mat-tab-group>

          </div>
        </div>
    </mat-card-content>
  </mat-card>

</div>
