<div class="container loader" *ngIf="cargandoNucleo"></div>
      <div class="row">
        <mat-card class="m-2 col-9" style="border-radius: 10px;">
          <mat-card-content>
            <div  *ngIf="!cargandoNucleo">
              <canvas id="canvas" style="height: 150px;"></canvas>
            </div>
          </mat-card-content>
        </mat-card>
        <div class="col-2" *ngIf="!cargandoNucleo">

          <div class="card">
            <div class="item item--1">
              <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
                <path fill="rgba(149,149,255,1)"
                d="M464 64H48C21.5 64 0 85.5 0 112v288c0 26.5 21.5 48 48 48h416c26.5 0 48-21.5 48-48V112c0-26.5-21.5-48-48-48zm0 48v40.8c-22.4 18.3-58.2 46.7-134.6 106.5-16.8 13.2-50.2 45.1-73.4 44.7-23.2 .4-56.6-31.5-73.4-44.7C106.2 199.5 70.4 171.1 48 152.8V112h416zM48 400V214.4c22.9 18.3 55.4 43.9 104.9 82.6 21.9 17.2 60.1 55.2 103.1 55 42.7 .2 80.5-37.2 103.1-54.9 49.5-38.8 82-64.4 104.9-82.7V400H48z"/></svg>

              <span class="quantity"> {{countPendientes}} </span>
              <span class="text text--1"> Pendientes </span>
            </div>
            <div class="item item--2">
              <svg
                height="24"
                width="24"
                viewBox="0 0 24 24"
                xmlns="http://www.w3.org/2000/svg"
              >
                <path d="M0 0L24 0 24 24 0 24z" fill="none"></path>
                <path
                  fill="rgba(252,161,71,1)"
                  d="M16 16c1.657 0 3 1.343 3 3s-1.343 3-3 3-3-1.343-3-3 1.343-3 3-3zM6 12c2.21 0 4 1.79 4 4s-1.79 4-4 4-4-1.79-4-4 1.79-4 4-4zm10 6c-.552 0-1 .448-1 1s.448 1 1 1 1-.448 1-1-.448-1-1-1zM6 14c-1.105 0-2 .895-2 2s.895 2 2 2 2-.895 2-2-.895-2-2-2zm8.5-12C17.538 2 20 4.462 20 7.5S17.538 13 14.5 13 9 10.538 9 7.5 11.462 2 14.5 2zm0 2C12.567 4 11 5.567 11 7.5s1.567 3.5 3.5 3.5S18 9.433 18 7.5 16.433 4 14.5 4z"
                ></path>
              </svg>
              <span class="quantity"> {{countFirmar}} </span>
              <span class="text text--2"> Por Firmar </span>
            </div>
            <div class="item item--3">
              <svg
                xmlns="http://www.w3.org/2000/svg"
                viewBox="0 0 24 24"
                width="24"
                height="24"
              >
                <path fill="none" d="M0 0h24v24H0z"></path>
                <path
                  d="M20.083 15.2l1.202.721a.5.5 0 0 1 0 .858l-8.77 5.262a1 1 0 0 1-1.03 0l-8.77-5.262a.5.5 0 0 1 0-.858l1.202-.721L12 20.05l8.083-4.85zm0-4.7l1.202.721a.5.5 0 0 1 0 .858L12 17.65l-9.285-5.571a.5.5 0 0 1 0-.858l1.202-.721L12 15.35l8.083-4.85zm-7.569-9.191l8.771 5.262a.5.5 0 0 1 0 .858L12 13 2.715 7.429a.5.5 0 0 1 0-.858l8.77-5.262a1 1 0 0 1 1.03 0zM12 3.332L5.887 7 12 10.668 18.113 7 12 3.332z"
                  fill="rgba(66,193,110,1)"
                ></path>
              </svg>
              <span class="quantity"> {{countArchivados}} </span>
              <span class="text text--3"> Archivados </span>
            </div>
            <div class="item item--4">
              <svg
                xmlns="http://www.w3.org/2000/svg"
                viewBox="0 0 24 24"
                width="24"
                height="24"
              >
                <path fill="none" d="M0 0h24v24H0z"></path>
                <path
                  d="M12 20h8v2h-8C6.477 22 2 17.523 2 12S6.477 2 12 2s10 4.477 10 10a9.956 9.956 0 0 1-2 6h-2.708A8 8 0 1 0 12 20zm0-10a2 2 0 1 1 0-4 2 2 0 0 1 0 4zm-4 4a2 2 0 1 1 0-4 2 2 0 0 1 0 4zm8 0a2 2 0 1 1 0-4 2 2 0 0 1 0 4zm-4 4a2 2 0 1 1 0-4 2 2 0 0 1 0 4z"
                  fill="rgba(220,91,183,1)"
                ></path>
              </svg>
              <span class="quantity"> {{countRemitidos}} </span>
              <span class="text text--4"> Remitidos </span>
            </div>
          </div>


        </div>
      </div>
      <mat-divider class="m-2"></mat-divider>
      <div class="row">
        <mat-card class="m-2 col-3" style="border-radius: 10px;">
          <mat-card-content>
            <div class="row">
              <ng-select placeholder="LISTA DE NUCLEOS" [virtualScroll]=true [(ngModel)]="nucleoSeleccionado"
              (change)="getChildren()"
                 style="font-size: 14px;" class="example-full-width">
                 <mat-option>SELECCIONE</mat-option>
                 <ng-option *ngFor="let c of nucleos" [value]="c" >{{c.acronimo}}</ng-option>
             </ng-select>

             <ng-select placeholder="LISTA DE BRIGADAS" [virtualScroll]=true
                 style="font-size: 14px;" class="example-full-width" [(ngModel)]="brigadaSeleccionada"
                 (change)="getUnidad()">
                 <mat-option>SELECCIONE</mat-option>
                 <ng-option *ngFor="let c of brigadas" [value]="c" >{{c.acronimo}}</ng-option>
             </ng-select>

             <ng-select placeholder="LISTA DE UNIDADES" [virtualScroll]=true
                 style="font-size: 14px;" class="example-full-width" [(ngModel)]="unidadSeleccionada"
                 (change)="mostrarDetalle()">
                 <mat-option>SELECCIONE</mat-option>
                 <ng-option *ngFor="let c of unidades" [value]="c" >{{c.acronimo}}</ng-option>
             </ng-select>
             <button mat-flat-button color="primary" class="example-full-width" (click)="mostrarDetalle()" >
               <i class="fas fa-search"></i> BUSCAR
              </button>
              <button mat-flat-button
                  style="background: rgba(25, 135, 84); color: #fff; margin-top: 5px; height: 100%;"
                  class="example-full-width" (click)="exportSuperAdm()" >
                <i class="fas fa-file-excel"></i> EXPORTAR A EXCEL
              </button>
            </div>
          </mat-card-content>
        </mat-card>
        <mat-card class="m-2 col-8" style="border-radius: 10px;" *ngIf="mostrarDetalleGrafica">
          <mat-card-content>
            <div *ngIf="!documentoBandejaBySuperAdm">
              <canvas id="canvasHorizontal"></canvas>
            </div>
          </mat-card-content>
        </mat-card>
      </div>
