<div class="container loader" *ngIf="cargando"></div>
<mat-card class="m-2" *ngIf="!cargando">
    <mat-card-header class="title-form">
        <mat-card-title>LISTA DE DOCUMENTOS POR RECOGER - OP</mat-card-title>
    </mat-card-header>
    <mat-card-content>
        <mat-form-field appearance="fill" class="example-full-width mt-4">
            <mat-label>Filtro</mat-label>
            <input matInput placeholder="Ingrese valor" (keyup)="applyFilter($event)" #input>
        </mat-form-field>
        <div class="mat-elevation-z8">
            <table mat-table [dataSource]="dataSource" matSort>
                <ng-container matColumnDef="Nro">
                    <th mat-header-cell *matHeaderCellDef mat-sort-header sortActionDescription="Sort by Nro">Nro.
                        registro</th>
                    <td mat-cell *matCellDef="let row"><strong>{{row.id }}</strong></td>
                </ng-container>

                <ng-container matColumnDef="Asunto">
                    <th mat-header-cell *matHeaderCellDef mat-sort-header>Asunto</th>
                    <td mat-cell *matCellDef="let row" style="padding: 10px;"> {{row.asunto }} </td>
                </ng-container>

                <ng-container matColumnDef="Documento">
                    <th mat-header-cell *matHeaderCellDef mat-sort-header style="width: 250px; margin: 5px;">Documento
                    </th>
                    <td mat-cell *matCellDef="let row" style="padding: 10px;"> {{row.documento }} </td>
                </ng-container>

                <ng-container matColumnDef="Origen">
                    <th mat-header-cell *matHeaderCellDef mat-sort-header>Origen</th>
                    <td mat-cell *matCellDef="let row"> {{row.organizacionOrigen }} </td>
                </ng-container>

                <ng-container matColumnDef="Destino">
                    <th mat-header-cell *matHeaderCellDef mat-sort-header>Destino</th>
                    <td mat-cell *matCellDef="let row"> {{row.organizacionDestino }} </td>
                </ng-container>

                <ng-container matColumnDef="Fecha Registro">
                    <th mat-header-cell *matHeaderCellDef mat-sort-header>Fecha Registro</th>
                    <td mat-cell *matCellDef="let row"> {{row.fechaRegistro | date: 'dd/MM/yyyy' }} </td>
                </ng-container>

                <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
                <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
                <tr class="mat-row" *matNoDataRow>
                    <td class="mat-cell" colspan="4">Sin datos obtenidos...</td>
                </tr>
            </table>
            <mat-paginator [pageSizeOptions]="[10, 15, 25, 100]" showFirstLastButtons
                aria-label="Seleccione pagina de documentos">
            </mat-paginator>
        </div>
    </mat-card-content>
</mat-card>
