<mat-card class="m-2">
    <mat-card-header class="title-form">
        <mat-card-title >LISTAR DOCUMENTOS OFICINA POSTAL</mat-card-title>
    </mat-card-header>
    <mat-card-content>
      <!-- <div class="bg-warning p-2 text-dark bg-opacity-10 mw-100 mb-2">{{form.value | json}}</div> -->
      <form  [formGroup]="form" (ngSubmit)="operate()" novalidate>
        <div class="row">    
          <div class="col-6">
              <ng-select placeholder="ENTREGAR CORRESPONDENCIA A" [virtualScroll]=true  
              (change)="buscarCorrespondencia($event)" formControlName="destino">
                  <mat-option>SELECCIONE</mat-option>
                  <ng-option *ngFor="let c of remitentes" [value]="c.codigoInterno" >{{c.acronimo}}</ng-option>
                </ng-select>
                <!-- <div *ngIf="firstFormGroup.get('organizacionRemitente').errors && firstFormGroup.get('organizacionRemitente').dirty" >
                  <mat-error *ngIf="firstFormGroup.get('organizacionRemitente').hasError('required')">* Campo requerido</mat-error>
                </div> -->
          </div> 
          <div class="col-6">
              <mat-form-field appearance="fill" class="example-full-width">
                  <mat-label>Filtro</mat-label>
                  <input matInput placeholder="Ingrese valor" (keyup)="applyFilter($event)"  #input>
              </mat-form-field>
          </div>
        </div>
        <div class="row mt-2" *ngIf="dataSource!=null">
            <div class="col-12">
                <table mat-table [dataSource]="dataSource" class="mat-elevation-z8">
                  <ng-container matColumnDef="select">
                    <th mat-header-cell *matHeaderCellDef >
                      <mat-checkbox (change)="$event ? toggleAllRows() : null" 
                                    [checked]="selection.hasValue() && isAllSelected()"
                                    [indeterminate]="selection.hasValue() && !isAllSelected()"
                                    [aria-label]="checkboxLabel()" style="background: #fff;">
                                
                      </mat-checkbox>
                    </th>
                    <td mat-cell *matCellDef="let row">
                      <mat-checkbox (click)="$event.stopPropagation();" 
                                    (change)="$event ? selection.toggle(row) : null"
                                    [checked]="selection.isSelected(row)"
                                    [aria-label]="checkboxLabel(row)">
                      </mat-checkbox>
                    </td>
                  </ng-container>
                
                  <ng-container matColumnDef="Nro">
                    <th mat-header-cell *matHeaderCellDef> No. </th>
                    <td mat-cell *matCellDef="let element"> {{element.codigo}} </td>
                  </ng-container>
                
                  <ng-container matColumnDef="Asunto">
                    <th mat-header-cell *matHeaderCellDef> Asunto </th>
                    <td mat-cell *matCellDef="let element"> {{element.asunto}} </td>
                  </ng-container>
                
                  <ng-container matColumnDef="Documento">
                    <th mat-header-cell *matHeaderCellDef> Documento </th>
                    <td mat-cell *matCellDef="let element"> {{element.clase.nombre}} </td>
                  </ng-container>
                
                  <ng-container matColumnDef="Origen">
                    <th mat-header-cell *matHeaderCellDef> Origen </th>
                    <td mat-cell *matCellDef="let element"> {{element.origen.acronimo}} </td>
                  </ng-container>
      
                  <ng-container matColumnDef="Destino">
                    <th mat-header-cell *matHeaderCellDef> Destino </th>
                    <td mat-cell *matCellDef="let element"> {{element.destino.acronimo}} </td>
                  </ng-container>
      
                  <ng-container matColumnDef="Fecha Registro">
                    <th mat-header-cell *matHeaderCellDef> Fecha Registro</th>
                    <td mat-cell *matCellDef="let element"> {{element.fechaRegistro | date:'dd-MMM-YYYY'}} </td>
                  </ng-container>
      
                  <!-- <ng-container matColumnDef="Acciones">
                      <th mat-header-cell *matHeaderCellDef > Acciones </th>
                      <td mat-cell *matCellDef="let row">
                        <div class="example-button-row">
                          <div class="example-flex-container">
                            <div class="example-button-container">
                              <button mat-mini-fab color="primary" class="mr-2"  >
                                <i class="far fa-file-pdf"></i>
                              </button>                                
                            </div>
                          </div>
                        </div>
                      </td>
                    </ng-container> -->
                
                  <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
                  <tr mat-row *matRowDef="let row; columns: displayedColumns;"
                      (click)="selection.toggle(row)">
                  </tr>
                </table>
                <!-- <mat-paginator [pageSizeOptions]="[5, 10, 20]" showFirstLastButtons aria-label="Select page of periodic elements">
                </mat-paginator> -->
            </div>
        </div>
        <div class="row mt-4">
          <div class="col-12">
            <div class="d-flex justify-content-center">
              <button type="submit" class="btn btn-outline-success btn-lg" style="margin-right: 5px; "  >ENTREGAR</button>
              <button type="button" class="btn btn-danger btn-lg" >CANCELAR</button>
            </div>
          </div>
        </div>
      </form>
        
    </mat-card-content>
    <mat-card-footer>
      <mat-progress-bar mode="indeterminate" *ngIf="cargando" ></mat-progress-bar>
    </mat-card-footer>
</mat-card>
