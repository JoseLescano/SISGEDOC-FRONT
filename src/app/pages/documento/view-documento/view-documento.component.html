<div class="tabset min-vh-100 " >
  <!-- Tab 1 -->
  <input type="radio" name="tabset" id="tab1" aria-controls="marzen" checked>
  <label for="tab1">DOCUMENTO</label>
  <!-- Tab 2 -->
  <input type="radio" name="tabset" id="tab2" aria-controls="rauchbier">
  <label for="tab2">ANEXOS</label>

  <div class="tab-panels" >
    <section id="marzen" class="tab-panel" >
      <div class="row min-vh-100" >
        <div class="col-xs-12 col-sm-12 col-md-12 col-lg-12 min-vh-100" >
          <iframe id="embeddedPage"
                  style="width: 100%; min-height: 100%;  border: 1px solid black; border-radius: 5px;"
                  *ngIf="!errorPDF">
          </iframe>
          <div *ngIf="errorPDF"
               style="width: 100%; height: 100%; border: 1px solid black;
                      border-radius: 5px; display: flex;
                      justify-content: center; align-items: center;" class="min-vh-100">
            <i class="fas fa-exclamation-triangle" style="color: red;"></i>
            <strong style="font-size: 12px; margin-left: 10px;">¡Error en PDF!</strong>
          </div>
        </div>
      </div>
    </section>
    <section id="rauchbier" class="tab-panel">
      <mat-selection-list #shoes [multiple]="false" *ngIf="anexos?.length>0">
        <mat-list-option *ngFor="let item of anexos" (click)="descargarAnexo(item)">
          <i class="far fa-file-archive" style="size: 32px;"></i>
          <div mat-line>{{item.url}}</div>
          <div mat-line> {{item.fechaCreacion| date : 'dd MMM YYYY'}} </div>
        </mat-list-option>
      </mat-selection-list>

      <div class="col-md-12 mt-2 alert alert-info" *ngIf="anexos?.length == 0 || anexos == null">
        No hay registros en la base de datos!
      </div>
    </section>
  </div>
</div>
