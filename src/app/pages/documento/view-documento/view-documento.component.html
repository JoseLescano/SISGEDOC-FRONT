<mat-card class="example-card" style="height: 100%;">
  <mat-card-content style="height: 90%;">
    <nav>
      <div class="nav nav-tabs" id="nav-tab" role="tablist">
        <button class="nav-link active" id="nav-home-tab" data-bs-toggle="tab" data-bs-target="#nav-home" type="button"
          role="tab" aria-controls="nav-home" aria-selected="true">VISUALIZACION DE DOCUMENTO</button>
        <button class="nav-link" id="nav-anexos-tab" data-bs-toggle="tab" data-bs-target="#nav-anexos" type="button"
          role="tab" aria-controls="nav-anexos" aria-selected="false">ANEXOS</button>
      </div>
    </nav>

    <div class="tab-content" id="nav-tabContent" style="width: 100%; height: 100%">
      <div class="tab-pane fade show active" id="nav-home" role="tabpanel" aria-labelledby="nav-home-tab"
        style="width: 100%; height: 100%">
        <div style="width: 100%; height: calc(100vh - 100px);">
          <iframe id="embeddedPage" style="width: 100%; height: 100%; border: none;" *ngIf="!errorPDF"></iframe>
          <div style="width: 100%; height: 96%; border: 1px solid black;
                border-radius: 5px; align-items: center; align-content: center;
                text-align: center; " *ngIf="errorPDF">
            <i class="fas fa-exclamation-triangle" style="color: red;"></i>
            <strong strong style="font-size: 12px;"> Error en PDF!</strong>
          </div>
        </div>
      </div>
      <div class="tab-pane fade" id="nav-anexos" role="tabpanel" aria-labelledby="nav-anexos-tab"
        style="height:auto; min-height: 200px; background: white;">
        <div class="alert alert-primary mt-3" role="alert" *ngIf="anexos==null || anexos.length==0">
          <strong>No hay registros en la base de datos!</strong>
        </div>
        <mat-selection-list #shoes [multiple]="false" *ngIf="anexos?.length>0">
          <mat-list-option *ngFor="let item of anexos" (click)="descargarAnexo(item)">
            <i class="far fa-file-archive" style="size: 32px;"></i>
            <div mat-line>{{item.url}}</div>
            <div mat-line>{{item.fechaCreacion | date:'dd MMM yyyy'}}</div>
          </mat-list-option>
        </mat-selection-list>
      </div>
    </div>
  </mat-card-content>
  <mat-card-actions style="text-align: right;">
    <button mat-raised-button color="accent" (click)="close()">CERRAR</button>
  </mat-card-actions>
</mat-card>
