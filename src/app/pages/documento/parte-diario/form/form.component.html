<mat-card  style="height: 100%;">
    <mat-card-content style="height: 90%;">
        <div class="row" style="height: 100%;">
            <div class="col-sm-12 col-lg-12" style="height: 100%;" >
                <ul class="nav nav-tabs mb-2" id="myTab" role="tablist" >
                    <li class="nav-item" role="presentation" >
                      <button class="nav-link active" id="home-tab" data-bs-toggle="tab" data-bs-target="#home"
                            type="button" role="tab" aria-controls="home" aria-selected="true">RESPUESTA</button>
                    </li>
                    <li class="nav-item" role="presentation"  *ngIf="documentoRespuesta!=null">
                      <button class="nav-link" id="profile-tab" data-bs-toggle="tab" data-bs-target="#profile"
                            type="button" role="tab" aria-controls="profile" aria-selected="false">REFERENCIA</button>
                    </li>
                    <li class="nav-item" role="presentation">
                      <button class="nav-link" id="contact-tab" data-bs-toggle="tab" data-bs-target="#contact"
                            type="button" role="tab" aria-controls="contact" aria-selected="false">ANEXOS</button>
                    </li>
                  </ul>
                  <div class="tab-content" id="myTabContent" style=" height: 95%;">
                    <div class="tab-pane fade show active" id="home" role="tabpanel" aria-labelledby="home-tab" 
                        style=" height: 100%;" >
                      <iframe id="documentoRespuesta" style="width: 100%; height: 100%;  border: 1px solid black;" 
                          *ngIf="!errorPDF"></iframe>
                      <div  style="width: 100%; height: 100%; border: 1px solid black;
                          border-radius: 5px; align-items: center; align-content: center;
                          text-align: center; " *ngIf="errorPDF">
                          <i class="fas fa-exclamation-triangle" style="color: red;" ></i>
                          <strong style="font-size: 12px;"> Error en PDF!</strong>
                      </div>
                    </div>
                    <div class="tab-pane fade" id="profile" role="tabpanel" aria-labelledby="profile-tab" 
                          style=" height: 100%;" *ngIf="documentoRespuesta!=null">
                      <iframe id="documentoReferencia" style="width: 100%; height: 100%;  border: 1px solid black;" 
                          *ngIf="!errorPDFReferencia"></iframe>
                      <div  style="width: 100%; height: 100%; border: 1px solid black;
                            border-radius: 5px; align-items: center; align-content: center;
                            text-align: center; " *ngIf="errorPDFReferencia">
                            <i class="fas fa-exclamation-triangle" style="color: red;" ></i>
                            <strong style="font-size: 12px;"> Error en PDF!</strong>
                      </div>
                    </div>
                    <div class="tab-pane fade" id="contact" role="tabpanel" aria-labelledby="contact-tab" style=" height: 100%;">
                      <mat-selection-list #shoes [multiple]="false" *ngIf="anexos?.length>0">
                        <mat-list-option *ngFor="let item of anexos" (click)="descargarAnexo(item)">
                          <mat-icon mat-list-icon>folder</mat-icon>
                          <div mat-line>{{item.url}}</div>
                          <div mat-line> {{item.fechaCreacion| date}} </div>
                        </mat-list-option>
                      </mat-selection-list>

                      <div class="col-md-12 mt-2 alert alert-info" *ngIf="anexos?.length == 0 || anexos == null">
                        No hay registros en la base de datos!
                      </div>
                    </div>
                  </div>
            </div>           
        </div>
        
    </mat-card-content>
    <mat-card-footer>
      <mat-progress-bar mode="indeterminate" *ngIf="cargando" ></mat-progress-bar>
    </mat-card-footer>
    <mat-card-actions align="end">
      <button mat-flat-button color="primary" *ngIf="mostrarDistribuir" (click)="distribuir()" >
        <i class="fas fa-paper-plane"></i><span> DISTRIBUIR</span>
      </button>
      <button mat-flat-button color="primary"  (click)="firmarDocumento()" >
        <i class="fas fa-file-signature"></i><span> FIRMAR</span>
      </button>
      <button mat-flat-button color="primary" *ngIf="!mostrarDistribuir" (click)="elevarDocumento()" >
        <i class="fas fa-hand-point-up"></i> ELEVAR
      </button>
      <!-- <button mat-flat-button color="warn" type="button">
        <i class="fas fa-pen-square" style="color: #fff;"></i> CORREGIR
      </button> -->
      <button mat-flat-button color="accent" routerLink="/principal/parte-diario">
        <i class="fas fa-stop-circle"></i> CANCELAR
      </button>
    </mat-card-actions>
</mat-card>
