<mat-card class="m-2">
  <mat-card-title>Mantenimiento de unidades</mat-card-title>
  <mat-card-content>
    <div class="d-flex align-items-cente">
      <div class="col-4">
        <mat-form-field appearance="fill" class="example-full-width" >
          <mat-label>SELECCIONE TIPO</mat-label>
          <mat-select >
            <mat-option *ngFor="let item of tipoBusqueda" [value]="item.id">
              {{item.text}}
            </mat-option>
          </mat-select>
        </mat-form-field>
      </div>
      <div class="col-8">
        <mat-form-field appearance="fill" class="example-full-width" style="margin-left: 5px;">
          <mat-label>INGRESE CODIGO DE UNIDAD O NOMBRE ACRONIMO/COMPLETO</mat-label>
          <input matInput placeholder="INGRESE CODIGO DE UNIDAD O NOMBRE ACRONIMO/COMPLETO">
        </mat-form-field>
      </div>
    </div>
  </mat-card-content>
</mat-card>
<mat-card class="m-2">
  <mat-card-title>Unidades encontradas</mat-card-title>
  <mat-card-content>
    <mat-form-field appearance="fill" class="example-full-width">
      <mat-label>Filtro</mat-label>
      <input matInput (keyup)="applyFilter($event)" placeholder="Ingrese valor" #input>
    </mat-form-field>

    <div class="mat-elevation-z8">
      <table mat-table [dataSource]="dataSource" matSort >

        <ng-container matColumnDef="#">
          <th mat-header-cell *matHeaderCellDef mat-sort-header > # </th>
          <td mat-cell *matCellDef="let row"> {{row.codigo}} </td>
        </ng-container>

        <ng-container matColumnDef="COD.INTERNO">
          <th mat-header-cell *matHeaderCellDef mat-sort-header>COD. INTERNO</th>
          <td mat-cell *matCellDef="let row"> {{row.nombre}} </td>
        </ng-container>

        <ng-container matColumnDef="ACRONIMO">
          <th mat-header-cell *matHeaderCellDef mat-sort-header>ACRONIMO</th>
          <td mat-cell *matCellDef="let row"> {{row.rol.nombre }} </td>
        </ng-container>

        <ng-container matColumnDef="NOMBRE-COMPLETO">
          <th mat-header-cell *matHeaderCellDef mat-sort-header>NOMBRE COMPLETO</th>
          <td mat-cell *matCellDef="let row"> {{row.organizacion.acronimo }} </td>
        </ng-container>


        <ng-container matColumnDef="ACCIONES">
          <th mat-header-cell *matHeaderCellDef > Acciones </th>
          <td mat-cell *matCellDef="let row">
            <div class="example-button-row">
              <div class="example-flex-container">
                <div class="example-button-container">
                  <button mat-mini-fab color="warn" >
                    <i class="fas fa-trash"></i>
                  </button>
                </div>
              </div>
            </div>
          </td>
        </ng-container>

        <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
        <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
        <tr class="mat-row" *matNoDataRow>
          <td class="mat-cell" colspan="4">Sin datos obtenidos...</td>
        </tr>
      </table>

      <mat-paginator [pageSizeOptions]="[10, 15, 25, 100]"  aria-label="Select page of users"></mat-paginator>
    </div>
</mat-card-content>
</mat-card>
