<mat-card class="m-2">
  <mat-card-title>Mantenimiento de unidades</mat-card-title>
  <mat-card-content>
    <div class="example-button-row">
      <!-- <button mat-raised-button>Basic</button> -->
      <button mat-raised-button color="primary">Codigo</button>
      <button mat-raised-button color="accent">Internas</button>
      <button mat-raised-button >Externas</button>
      <button mat-raised-button color="warn">Dependencias/Unidades</button>
      <!-- <a mat-raised-button href="https://www.google.com/" target="_blank">Link</a> -->
    </div>

    <!-- <mat-chip-list aria-label="Fish selection" class="mt-2">
      <mat-chip ngif="!mostrarInput" selected>Codigo</mat-chip>
      <mat-chip color="primary" selected >Internas</mat-chip>
      <mat-chip color="accent" selected>Externas</mat-chip>
      <mat-chip color="warn" selected (click)="searchOrganizacion(4)" >Dependencias/Unidades</mat-chip>
    </mat-chip-list> -->
    <div class="col-12 mt-2" *ngIf="mostrarInput">
      <mat-form-field appearance="fill" class="example-full-width" style="margin-left: 5px;">
        <mat-label>INGRESE CODIGO DE UNIDAD O NOMBRE ACRONIMO/COMPLETO</mat-label>
        <input matInput placeholder="INGRESE CODIGO DE UNIDAD O NOMBRE ACRONIMO/COMPLETO">
    </mat-form-field>
    </div>
  </mat-card-content>
</mat-card>
<mat-card class="m-2">
  <mat-card-title>Unidades encontradas</mat-card-title>
  <mat-card-content>
    <mat-form-field appearance="fill" class="example-full-width">
      <mat-label>Filtro</mat-label>
      <input matInput (keyup)="applyFilter($event)" placeholder="Ingrese valor" #input>
    </mat-form-field>

    <div class="mat-elevation-z8">
      <table mat-table [dataSource]="dataSource" matSort >

        <ng-container matColumnDef="#">
          <th mat-header-cell *matHeaderCellDef mat-sort-header > # </th>
          <td mat-cell *matCellDef="let row"> {{row.vid}} </td>
        </ng-container>

        <ng-container matColumnDef="COD.INTERNO">
          <th mat-header-cell *matHeaderCellDef mat-sort-header>COD. INTERNO</th>
          <td mat-cell *matCellDef="let row"> {{row.codigoInterno}} </td>
        </ng-container>

        <ng-container matColumnDef="ACRONIMO">
          <th mat-header-cell *matHeaderCellDef mat-sort-header>ACRONIMO</th>
          <td mat-cell *matCellDef="let row"> {{row.acronimo }} </td>
        </ng-container>

        <ng-container matColumnDef="NOMBRE-COMPLETO">
          <th mat-header-cell *matHeaderCellDef mat-sort-header>NOMBRE COMPLETO</th>
          <td mat-cell *matCellDef="let row"> {{row.nombreLargo }} </td>
        </ng-container>


        <ng-container matColumnDef="ACCIONES">
          <th mat-header-cell *matHeaderCellDef > Acciones </th>
          <td mat-cell *matCellDef="let row">
            <div class="example-button-row">
              <div class="example-flex-container">
                <div class="example-button-container">
                  <button mat-mini-fab color="primary" (click)="imprimirListaPersonal(row.codigoInterno, false)" >
                    <i class="fas fa-users"></i>
                  </button>
                  <button mat-mini-fab color="accent" >
                    <i class="fas fa-exchange-alt"></i>
                  </button>
                  <button mat-mini-fab color="warn" >
                    <i class="fas fa-trash"></i>
                  </button>
                </div>
              </div>
            </div>
          </td>
        </ng-container>

        <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
        <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
        <tr class="mat-row" *matNoDataRow>
          <td class="mat-cell" colspan="4">Sin datos obtenidos...</td>
        </tr>
      </table>

      <mat-paginator [pageSizeOptions]="[10, 15, 25, 100]"  aria-label="Select page of users"></mat-paginator>
    </div>
</mat-card-content>
</mat-card>
