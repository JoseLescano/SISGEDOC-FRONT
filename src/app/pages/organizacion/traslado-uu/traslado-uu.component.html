
<mat-card class="m-2">
  <mat-card-header class="title-form  d-flex justify-content-between" >
    <mat-card-title >TRASLADO DE UNIDADES</mat-card-title>
    <!-- <button mat-flat-button color="primary"  style="margin-right: 5px;"  >
      <i class="fas fa-print"></i> IMPRIMIR
    </button> -->
  </mat-card-header>
  <mat-card-content>
    <div class="row d-flex align-items-center justify-content-between">
      <div class="col">
        <mat-form-field appearance="fill" class="example-full-width mt-2">
          <mat-label>Unidad Origen</mat-label>
          <input matInput placeholder="Ingrese valor" [(ngModel)]="codigoOrigen" >
        </mat-form-field>
      </div>
      <div class="col">
        <mat-form-field appearance="fill" class="example-full-width mt-2">
          <mat-label>Unidad Destino</mat-label>
          <input matInput placeholder="Ingrese valor" [(ngModel)]="codigoDestino">
        </mat-form-field>
      </div>
      <div class="col">
        <button mat-flat-button color="primary"  style="margin-right: 5px;" (click)="getInfo(codigoOrigen, codigoDestino)"  >
          <i class="fas fa-search"></i> Ver Info.
        </button>
      </div>
    </div>
  </mat-card-content>
</mat-card>

<div class="row">
  <div class="col-5">
    <mat-card class="m-2">
      <mat-card-header class="title-form  d-flex justify-content-between" >
        <mat-card-title >INFORMACIÓN OBTENIDA ORIGEN</mat-card-title>
      </mat-card-header>
      <mat-card-content>
        <div class="col-12">
          <mat-form-field appearance="fill" class="example-full-width mt-2">
            <mat-label>Nombre unidad origen</mat-label>
            <input matInput placeholder="Ingrese valor" [(ngModel)]="unidadOrigen.acronimo" disabled >
          </mat-form-field>
        </div>
        <div class="col-12">
          <table mat-table [dataSource]="dataSource" >

            <ng-container matColumnDef="codigoInterno">
              <th mat-header-cell *matHeaderCellDef> codigoInterno </th>
              <td mat-cell *matCellDef="let item">
                {{ item.codigoInterno }}
              </td>
            </ng-container>

            <!-- Acción -->
            <ng-container matColumnDef="acronimo">
              <th mat-header-cell *matHeaderCellDef> acronimo </th>
              <td mat-cell *matCellDef="let item">
                {{ item.acronimo }}
              </td>
            </ng-container>

            <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
            <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>

            <tr class="mat-row" *matNoDataRow>
              <td class="mat-cell" colspan="4">Sin datos obtenidos...</td>
            </tr>
          </table>
          <mat-paginator [pageSizeOptions]="[10, 15, 25, 100]"  aria-label="Select page of users"></mat-paginator>
        </div>
      </mat-card-content>
    </mat-card>
  </div>
  <div class="col-2 actions">
    <button mat-mini-fab color="primary" >
     <i class="fas fa-angle-double-right"></i>
    </button>
  </div>
  <div class="col-5">
    <mat-card class="m-2">
      <mat-card-header class="title-form  d-flex justify-content-between" >
        <mat-card-title >INFORMACIÓN OBTENIDA DESTINO</mat-card-title>
      </mat-card-header>
      <mat-card-content>
        <mat-form-field appearance="fill" class="example-full-width mt-2">
      <mat-label>Nombre unidad destino</mat-label>
      <input matInput placeholder="Ingrese valor" [(ngModel)]="unidadDestino.acronimo" disabled>
    </mat-form-field>
      </mat-card-content>
    </mat-card>

  </div>
</div>
