<mat-card class="m-2">
    <mat-card-subtitle>Doble Autentificacion</mat-card-subtitle>
    <div class="row g-3" >
        <div class="col-md-12">
            <mat-form-field appearance="fill" class="example-full-width">
                <mat-label>Ingrese campo</mat-label>
                <input matInput placeholder="Ingrese número CIP ó DNI ó marbete" [(ngModel)]="campoIngresado" required (keydown.enter)="buscarPersona($event)">
                <mat-hint align="start" *ngIf="campoIngresado?.length>= 8" style="color: #06d76c;"  ><strong>Presione la tecla Enter</strong> </mat-hint>
                <mat-error >x</mat-error>
            </mat-form-field>
        </div>
        <div class="col-md-4">
            <mat-form-field appearance="fill" class="example-full-width">
                <mat-label>Grado</mat-label>
                <input matInput  disabled>
            </mat-form-field>
        </div>
        <div class="col-md-4">
            <mat-form-field appearance="fill" class="example-full-width">
                <mat-label>Arma/Especialidad</mat-label>
                <input matInput disabled>
            </mat-form-field>
        </div>
        <div class="col-md-4">
            <mat-form-field appearance="fill" class="example-full-width">
                <mat-label>Nombre completo</mat-label>
                <input matInput  disabled>
            </mat-form-field>
        </div>
        <div class="col-md-12">
            <mat-form-field appearance="fill" class="example-full-width">
                <mat-label>Usuario chasqui</mat-label>
                <input matInput  disabled>
            </mat-form-field>
        </div>
    </div>
</mat-card>
