
<mat-card class="m-2">
  <mat-card-header class="title-form">
    <mat-card-title >REGISTRO DE PERSONAL EXTERNO</mat-card-title>
  </mat-card-header>
  <mat-card-content>
      <form [formGroup]="myForm" (submit)="operate()" >
        <div [hidden]="true">
          <mat-form-field >
              <input matInput  formControlName="codigo" required  >
          </mat-form-field>
        </div>
      <div class="row mt-2">
        <div class="col-6">
          <mat-form-field appearance="fill" class="example-full-width">
            <mat-label>NOMBRES</mat-label>
            <input matInput type="text" formControlName="nombres">
          </mat-form-field>

        </div>
        <div class="col-6">
          <mat-form-field appearance="fill" class="example-full-width">
            <mat-label>APELLIDOS</mat-label>
            <input matInput type="text" formControlName="apellidos">
          </mat-form-field>
        </div>
      </div>

      <div class="row mt-2">
        <div class="col-6">
          <mat-form-field appearance="fill" class="example-full-width">
            <mat-label>NRO DOCUMENTO</mat-label>
            <input matInput type="text" formControlName="dni">
          </mat-form-field>
        </div>
        <div class="col-6">
          <mat-form-field appearance="fill" class="example-full-width">
            <mat-label>EMAIL</mat-label>
            <input matInput type="email" formControlName="email">
          </mat-form-field>
        </div>
      </div>


      <mat-card-actions align="end" >
        <button mat-flat-button type="submit" class="btn-opcion" style="margin-right: 2px;" color="primary"  [disabled]="myForm.invalid" >GUARDAR</button>
        <button mat-flat-button color="warn" type="button" class="btn-opcion"  (click)="getPersonalExterno()">CANCELAR</button>
      </mat-card-actions>
      <!-- <div>{{myForm.value | json}}</div> -->
    </form>
  </mat-card-content>

</mat-card>

<mat-card class="m-2" >
  <mat-card-header class="title-form">
    <mat-card-title >LISTA DE PERSONAL EXTERNO REGISTRADO</mat-card-title>
  </mat-card-header>
  <mat-card-content>
      <mat-form-field appearance="fill" class="example-full-width">
        <mat-label>Filtro</mat-label>
        <input matInput (keyup)="applyFilter($event)" placeholder="Ingrese valor" #input>
      </mat-form-field>

      <div class="mat-elevation-z8">
        <table mat-table [dataSource]="dataSource" matSort>
          <ng-container matColumnDef="Codigo">
            <th mat-header-cell *matHeaderCellDef mat-sort-header sortActionDescription="Sort by Nro">Codigo</th>
            <td mat-cell *matCellDef="let row"><strong>{{row.codigo }}</strong></td>
          </ng-container>

          <ng-container matColumnDef="Nombres">
            <th mat-header-cell *matHeaderCellDef mat-sort-header >Nombres</th>
            <td mat-cell *matCellDef="let row" style="padding: 10px;"> {{row.nombres }} </td>
          </ng-container>

          <ng-container matColumnDef="Apellidos">
            <th mat-header-cell *matHeaderCellDef mat-sort-header>Apellidos</th>
            <td mat-cell *matCellDef="let row"> {{row.apellidos }} </td>
          </ng-container>

          <ng-container matColumnDef="DNI">
            <th mat-header-cell *matHeaderCellDef mat-sort-header>DNI</th>
            <td mat-cell *matCellDef="let row"> {{row.dni }} </td>
          </ng-container>

          <ng-container matColumnDef="Email">
              <th mat-header-cell *matHeaderCellDef mat-sort-header>Email</th>
              <td mat-cell *matCellDef="let row"> {{row.email  }} </td>
          </ng-container>

          <ng-container matColumnDef="Estado">
              <th mat-header-cell *matHeaderCellDef mat-sort-header style="width: 250px; margin: 5px;">Estado</th>
              <td mat-cell *matCellDef="let row" style="padding: 10px;">
                <span [class]="row.estado==1 ? 'badge text-bg-success':'badge text-bg-danger'" >{{row.estado==1? 'ACTIVO':'INACTIVO'}}</span>
              </td>
          </ng-container>

          <ng-container matColumnDef="Acciones">
            <th mat-header-cell *matHeaderCellDef > Acciones </th>
            <td mat-cell *matCellDef="let row">
                <button mat-flat-button  color="primary"  style="margin-top: 5px;" (click)="editar(row)">
                  <i class="fas fa-edit"></i> EDITAR
                </button>
                <button mat-flat-button  color="accent" style="margin-left: 2px;margin-top: 5px;" (click)="cambiarEstado(row.codigo)" >
                  <i class="fas fa-exchange-alt"></i> CAMBIAR ESTADO
                </button>
            </td>
          </ng-container>

          <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
          <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
          <tr class="mat-row" *matNoDataRow>
              <td class="mat-cell" colspan="4">Sin resultado...</td>
          </tr>
        </table>
        <mat-paginator [pageSizeOptions]="[10, 15, 25, 100]"  aria-label="Select page of users"></mat-paginator>
      </div>
  </mat-card-content>

</mat-card>
